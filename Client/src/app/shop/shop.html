<div class="container mt-5">
  <div class="row">
    <h1 class="main-title">Shopping</h1>
    <section class="col-md-3">
      <div class="sidebar">
        <h4 class="section-title">Sorting</h4>
        <div class="custom-select-wrapper mb-4">
          <select class="form-select custom-select" name="" id="">
            <option value="Name">Name</option>
            <option value="PriceAsn">Price:Min-Max</option>
            <option value="PriceDes">Price:Max-Min</option>
          </select>
        </div>
        <h4 class="section-title">Categories</h4>
        <ul class="category-list">
          <li class="category-item active">Laptop</li>
          <li class="category-item">Mobile</li>
          <li class="category-item">Watch</li>
        </ul>
      </div>
    </section>
    <section class="col-md-9">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="paging-container">
          <span class="text-dark">Showing 3 of 5</span>
        </div>
        <div class="search-container">
          <div class="input-group search-bar">
            <input type="text" class="form-control custom-input" placeholder="Search..." />
            <input type="button" class="btn btn-primary-custom" value="Search" />
            <input type="button" class="btn btn-secondary-custom" value="Reset" />
          </div>
        </div>
      </div>

      <div class="row g-4 mt-2">
        <ng-container>
          <app-shop-item></app-shop-item>
        </ng-container>
      </div>
    </section>
  </div>
</div>
